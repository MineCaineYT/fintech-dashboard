<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTech Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* =========================================
           CORE THEME SYSTEM & CSS VARIABLES
           ========================================= */
        :root {
            /* Light Theme (emerald/royal blue) */
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-input: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-green: #10b981;
            --accent-blue: #2563eb;
            --accent-danger: #ef4444;
            --glow-green: rgba(16, 185, 129, 0.4);
            --glow-blue: rgba(37, 99, 235, 0.4);
        }

        [data-theme="dark"] {
            /* Dark Theme (neon green/cyber cyan) */
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --accent-green: #34d399;
            --accent-blue: #06b6d4;
            --accent-danger: #f87171;
            --glow-green: rgba(52, 211, 153, 0.4);
            --glow-blue: rgba(6, 182, 212, 0.4);
        }

        /* =========================================
           GLOBAL STYLES & HARDWARE ACCELERATION
           ========================================= */
        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.5s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            overflow-x: hidden;
        }

        .dashboard-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: background-color 0.5s, border-color 0.5s, transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
            will-change: transform, box-shadow;
        }

        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
        }

        input[type="number"], input[type="text"] {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--glow-blue);
        }

        /* =========================================
           CUSTOM UI ELEMENTS & ANIMATIONS
           ========================================= */
        .profit-glow {
            color: var(--accent-green);
            text-shadow: 0 0 15px var(--glow-green);
            animation: pulse-glow 3s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulse-glow {
            0% { text-shadow: 0 0 10px var(--glow-green); }
            100% { text-shadow: 0 0 25px var(--glow-green), 0 0 5px var(--accent-green); }
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent-blue);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px var(--glow-blue);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--border-color);
            border-radius: 2px;
        }

        /* Data Grid Animations */
        .row-enter {
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px) scale(0.98);
        }
        .row-exit {
            animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideOut {
            to { opacity: 0; transform: scale(0.95); }
        }

        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        .ripple::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .ripple:active::after {
            transform: scale(0, 0);
            opacity: .3;
            transition: 0s;
        }

        /* SVG Chart Transitions */
        .chart-segment {
            transition: stroke-dasharray 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                        stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="w-full max-w-7xl flex justify-between items-center mb-8">
        <h1 class="text-2xl md:text-3xl font-bold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-[var(--accent-blue)] to-[var(--accent-green)]" data-i18n="title">
            FinTech Dashboard
        </h1>
        <div class="flex gap-4 items-center">
            <button id="langToggle" class="px-3 py-1 rounded-full border border-[var(--border-color)] hover:bg-[var(--bg-card)] transition-colors font-medium text-sm">
                EN / RU
            </button>
            <button id="themeToggle" class="p-2 rounded-full border border-[var(--border-color)] hover:bg-[var(--bg-card)] transition-colors group">
                <svg id="themeIcon" class="w-5 h-5 text-[var(--text-main)] group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
        
        <section class="dashboard-card rounded-2xl p-6 lg:col-span-4 flex flex-col gap-6 h-fit">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-[var(--glow-blue)] text-[var(--accent-blue)]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h2 class="text-xl font-semibold" data-i18n="simTitle">Compound Simulator</h2>
            </div>

            <div class="flex flex-col gap-4">
                <div>
                    <label class="text-sm font-medium text-[var(--text-muted)] mb-1 block" data-i18n="initCap">Initial Capital</label>
                    <input type="number" id="simInit" value="10000" min="0" class="w-full p-2.5 rounded-lg text-lg font-mono">
                </div>
                <div>
                    <label class="text-sm font-medium text-[var(--text-muted)] mb-1 block" data-i18n="moCont">Monthly Contribution</label>
                    <input type="number" id="simMonthly" value="500" min="0" class="w-full p-2.5 rounded-lg text-lg font-mono">
                </div>
                <div>
                    <label class="text-sm font-medium text-[var(--text-muted)] mb-1 block" data-i18n="annRate">Annual Rate (%)</label>
                    <input type="number" id="simRate" value="8" min="0" step="0.1" class="w-full p-2.5 rounded-lg text-lg font-mono">
                </div>
                <div class="pt-2">
                    <div class="flex justify-between items-end mb-2">
                        <label class="text-sm font-medium text-[var(--text-muted)]" data-i18n="years">Investment Period</label>
                        <span id="yearsVal" class="text-lg font-bold text-[var(--accent-blue)]">10 <span data-i18n="yearsLabel">Yrs</span></span>
                    </div>
                    <input type="range" id="simYears" min="1" max="30" value="10">
                </div>
                
                <button id="btnCalc" class="mt-4 ripple w-full py-3 rounded-lg font-bold text-white transition-transform hover:scale-[1.02]" style="background-color: var(--accent-blue);" data-i18n="calcBtn">
                    Calculate Projection
                </button>
            </div>

            <div class="mt-4 p-5 rounded-xl border border-[var(--border-color)] bg-[var(--bg-body)]">
                <div class="mb-4">
                    <p class="text-xs text-[var(--text-muted)] uppercase tracking-wider mb-1" data-i18n="finVal">Final Portfolio Value</p>
                    <p class="text-3xl font-bold font-mono" id="outTotal">$0.00</p>
                </div>
                <div>
                    <p class="text-xs text-[var(--text-muted)] uppercase tracking-wider mb-1" data-i18n="netProf">Net Profit</p>
                    <p class="text-2xl font-bold font-mono profit-glow" id="outProfit">+$0.00</p>
                </div>
            </div>
        </section>

        <section class="dashboard-card rounded-2xl p-6 lg:col-span-8 flex flex-col gap-6">
            
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-[var(--border-color)] pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-[var(--glow-green)] text-[var(--accent-green)]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <h2 class="text-xl font-semibold" data-i18n="portTitle">Dynamic Portfolio Tracker</h2>
                </div>
                
                <div class="relative w-full sm:w-64">
                    <input type="text" id="searchAsset" class="w-full pl-10 pr-4 py-2 rounded-lg text-sm" data-i18n-placeholder="search">
                    <svg class="w-4 h-4 absolute left-3 top-3 text-[var(--text-muted)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div class="relative w-48 h-48 mx-auto md:mx-0 flex-shrink-0">
                    <svg viewBox="0 0 42 42" class="w-full h-full drop-shadow-lg" id="pieChart">
                        </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center rounded-full">
                        <span class="text-xs text-[var(--text-muted)] font-medium uppercase tracking-wider" data-i18n="colTotal">Total</span>
                        <span class="text-lg font-bold font-mono" id="chartTotalValue">$0</span>
                    </div>
                </div>

                <div class="flex flex-col gap-3 p-4 rounded-xl border border-[var(--border-color)] bg-[var(--bg-body)]">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="col-span-2">
                            <input type="text" id="addName" class="w-full p-2 rounded-md text-sm" data-i18n-placeholder="assetName">
                        </div>
                        <div>
                            <input type="number" id="addQty" min="0.01" step="0.01" class="w-full p-2 rounded-md text-sm" data-i18n-placeholder="qty">
                        </div>
                        <div>
                            <input type="number" id="addPrice" min="0" step="0.01" class="w-full p-2 rounded-md text-sm" data-i18n-placeholder="price">
                        </div>
                    </div>
                    <button id="btnAddAsset" class="ripple w-full py-2 rounded-md text-sm font-bold text-white transition-transform hover:scale-[1.02]" style="background-color: var(--accent-green);" data-i18n="addBtn">
                        Add Asset
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto mt-2">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-[var(--border-color)] text-sm text-[var(--text-muted)]">
                            <th class="py-3 px-2 font-medium" data-i18n="colName">Name</th>
                            <th class="py-3 px-2 font-medium" data-i18n="colQty">Qty</th>
                            <th class="py-3 px-2 font-medium" data-i18n="colPrice">Price</th>
                            <th class="py-3 px-2 font-medium text-right" data-i18n="colTotal">Total</th>
                            <th class="py-3 px-2 font-medium text-center" data-i18n="colAct">Action</th>
                        </tr>
                    </thead>
                    <tbody id="portfolioBody" class="text-sm font-mono">
                        </tbody>
                </table>
            </div>
            
        </section>
    </main>

    <script>
        /** * DICTIONARY - Multilingual System Support 
         */
        const i18n = {
            en: {
                title: "FinTech Dashboard",
                simTitle: "Compound Simulator",
                initCap: "Initial Capital",
                moCont: "Monthly Contribution",
                annRate: "Annual Rate (%)",
                years: "Investment Period",
                yearsLabel: "Yrs",
                calcBtn: "Calculate Projection",
                finVal: "Final Portfolio Value",
                netProf: "Net Profit",
                portTitle: "Dynamic Portfolio Tracker",
                assetName: "Asset Name (e.g. BTC)",
                qty: "Quantity",
                price: "Price per Unit",
                addBtn: "+ Add Asset",
                search: "Search assets...",
                colName: "Asset",
                colQty: "Balance",
                colPrice: "Price",
                colTotal: "Value",
                colAct: "Action"
            },
            ru: {
                title: "Финтех Дашборд",
                simTitle: "Калькулятор сложного процента",
                initCap: "Начальный капитал",
                moCont: "Ежемесячный взнос",
                annRate: "Годовая ставка (%)",
                years: "Срок инвестиций",
                yearsLabel: "Лет",
                calcBtn: "Рассчитать прогноз",
                finVal: "Итоговая стоимость",
                netProf: "Чистая прибыль",
                portTitle: "Динамический трекер портфеля",
                assetName: "Активы (напр. BTC)",
                qty: "Количество",
                price: "Цена за единицу",
                addBtn: "+ Добавить актив",
                search: "Поиск активов...",
                colName: "Актив",
                colQty: "Баланс",
                colPrice: "Цена",
                colTotal: "Сумма",
                colAct: "Действие"
            }
        };

        /** * GLOBAL STATE 
         */
        const state = {
            lang: 'en',
            theme: 'dark',
            searchTerm: '',
            colors: ['#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4'],
            assets: [
                { id: 1, name: 'Bitcoin (BTC)', qty: 0.15, price: 64200.50 },
                { id: 2, name: 'Apple (AAPL)', qty: 45, price: 175.25 },
                { id: 3, name: 'S&P 500 ETF', qty: 12.5, price: 512.10 }
            ]
        };

        // DOM Elements
        const DOM = {
            html: document.documentElement,
            themeToggle: document.getElementById('themeToggle'),
            themeIcon: document.getElementById('themeIcon'),
            langToggle: document.getElementById('langToggle'),
            // Sim Elements
            simInit: document.getElementById('simInit'),
            simMonthly: document.getElementById('simMonthly'),
            simRate: document.getElementById('simRate'),
            simYears: document.getElementById('simYears'),
            yearsVal: document.getElementById('yearsVal'),
            btnCalc: document.getElementById('btnCalc'),
            outTotal: document.getElementById('outTotal'),
            outProfit: document.getElementById('outProfit'),
            // Portfolio Elements
            portfolioBody: document.getElementById('portfolioBody'),
            searchAsset: document.getElementById('searchAsset'),
            addName: document.getElementById('addName'),
            addQty: document.getElementById('addQty'),
            addPrice: document.getElementById('addPrice'),
            btnAddAsset: document.getElementById('btnAddAsset'),
            pieChart: document.getElementById('pieChart'),
            chartTotalValue: document.getElementById('chartTotalValue')
        };

        /** * FORMATTING UTILS 
         */
        const formatCurrency = (val) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val);
        const generateId = () => Date.now() + Math.random().toString(16).slice(2);

        /** * NUMBER CLIMBING ANIMATION (Hardware-accelerated via rAF)
         */
        function animateValue(obj, start, end, duration, prefix = "") {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                // Ease-out cubic calculation for smooth slowing down at end
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentVal = start + easeOut * (end - start);
                
                obj.textContent = prefix + formatCurrency(currentVal);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.textContent = prefix + formatCurrency(end);
                }
            };
            window.requestAnimationFrame(step);
        }

        /** * MODULE 1: COMPOUND SIMULATOR LOGIC
         */
        function calculateCompound() {
            const P = parseFloat(DOM.simInit.value) || 0;
            const PMT = parseFloat(DOM.simMonthly.value) || 0;
            const r = (parseFloat(DOM.simRate.value) || 0) / 100 / 12; // Monthly rate
            const t = parseInt(DOM.simYears.value) || 0;
            const n = t * 12; // Total months

            let finalBalance = P;
            let totalInvested = P;

            // Iterative calculation to accurately handle monthly contributions
            for (let i = 0; i < n; i++) {
                finalBalance += PMT;
                totalInvested += PMT;
                finalBalance += finalBalance * r;
            }

            const netProfit = finalBalance - totalInvested;

            // Trigger Animation
            const currentTotal = parseFloat(DOM.outTotal.textContent.replace(/[^0-9.-]+/g,"")) || 0;
            const currentProfit = parseFloat(DOM.outProfit.textContent.replace(/[^0-9.-]+/g,"")) || 0;

            animateValue(DOM.outTotal, currentTotal, finalBalance, 1200);
            animateValue(DOM.outProfit, currentProfit, netProfit, 1200, "+");
        }

        /** * MODULE 2: PORTFOLIO & SVG DONUT CHART ENGINE
         */
        function renderChart() {
            let total = state.assets.reduce((sum, a) => sum + (a.qty * a.price), 0);
            DOM.chartTotalValue.textContent = formatCurrency(total);
            
            let svgContent = '';
            let offset = 0;
            const radius = 15.91549430918954; // Circumference = 100 for easy percentages

            state.assets.forEach((a, i) => {
                if(total === 0) return;
                const percent = ((a.qty * a.price) / total) * 100;
                const color = state.colors[i % state.colors.length];
                
                svgContent += `
                    <circle cx="21" cy="21" r="${radius}" 
                            fill="transparent" 
                            stroke="${color}" 
                            stroke-width="5" 
                            stroke-dasharray="${percent} ${100 - percent}" 
                            stroke-dashoffset="${100 - offset}" 
                            class="chart-segment">
                    </circle>`;
                offset += percent;
            });

            // Base circle if empty
            if (total === 0) {
                svgContent = `<circle cx="21" cy="21" r="${radius}" fill="transparent" stroke="var(--border-color)" stroke-width="5"></circle>`;
            }
            DOM.pieChart.innerHTML = svgContent;
        }

        function renderTable() {
            DOM.portfolioBody.innerHTML = '';
            const filtered = state.assets.filter(a => a.name.toLowerCase().includes(state.searchTerm.toLowerCase()));

            filtered.forEach((asset, index) => {
                const tr = document.createElement('tr');
                tr.className = `border-b border-[var(--border-color)] hover:bg-[var(--bg-input)] transition-colors row-enter`;
                tr.style.animationDelay = `${index * 0.05}s`;
                tr.id = `asset-${asset.id}`;
                tr.innerHTML = `
                    <td class="py-3 px-2 flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full" style="background-color: ${state.colors[state.assets.indexOf(asset) % state.colors.length]}"></span>
                        ${asset.name}
                    </td>
                    <td class="py-3 px-2">${asset.qty}</td>
                    <td class="py-3 px-2">${formatCurrency(asset.price)}</td>
                    <td class="py-3 px-2 text-right font-bold" style="color: var(--accent-blue)">${formatCurrency(asset.qty * asset.price)}</td>
                    <td class="py-3 px-2 text-center">
                        <button onclick="deleteAsset(${asset.id})" class="text-[var(--text-muted)] hover:text-[var(--accent-danger)] transition-colors p-1" title="Delete">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </td>
                `;
                DOM.portfolioBody.appendChild(tr);
            });
        }

        function addAsset() {
            const name = DOM.addName.value.trim();
            const qty = parseFloat(DOM.addQty.value);
            const price = parseFloat(DOM.addPrice.value);

            if (!name || isNaN(qty) || isNaN(price) || qty <= 0 || price < 0) {
                // Shake validation
                DOM.addName.parentElement.parentElement.classList.add('animate-[shake_0.5s_ease-in-out]');
                setTimeout(() => DOM.addName.parentElement.parentElement.classList.remove('animate-[shake_0.5s_ease-in-out]'), 500);
                return;
            }

            state.assets.push({ id: generateId(), name, qty, price });
            
            // Clear inputs
            DOM.addName.value = '';
            DOM.addQty.value = '';
            DOM.addPrice.value = '';

            reRenderPortfolio();
        }

        window.deleteAsset = function(id) {
            const row = document.getElementById(`asset-${id}`);
            if (row) {
                // Apply exit animation class
                row.classList.remove('row-enter');
                row.classList.add('row-exit');
                
                // Wait for animation to finish before destroying data & dom
                setTimeout(() => {
                    state.assets = state.assets.filter(a => a.id !== id);
                    reRenderPortfolio();
                }, 300);
            }
        };

        function reRenderPortfolio() {
            renderChart();
            renderTable();
        }

        /** * MODULE 3: THEME & MULTILINGUAL TOGGLES
         */
        function updateUIStrings() {
            const dict = i18n[state.lang];
            
            // Text nodes
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (dict[key]) el.textContent = dict[key];
            });
            // Placeholders
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
                const key = el.getAttribute('data-i18n-placeholder');
                if (dict[key]) el.placeholder = dict[key];
            });
            // Update dynamic slider text
            DOM.yearsVal.innerHTML = `${DOM.simYears.value} <span data-i18n="yearsLabel">${dict.yearsLabel}</span>`;
        }

        DOM.langToggle.addEventListener('click', () => {
            // Smooth fade-out, update, fade-in transition
            document.body.style.opacity = '0.7';
            setTimeout(() => {
                state.lang = state.lang === 'en' ? 'ru' : 'en';
                updateUIStrings();
                document.body.style.opacity = '1';
            }, 150);
        });

        DOM.themeToggle.addEventListener('click', () => {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            DOM.html.setAttribute('data-theme', state.theme);
            
            // Swap SVG Icon
            if(state.theme === 'dark') {
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>`;
            } else {
                DOM.themeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>`;
            }
        });

        /** * EVENT LISTENERS BINDING
         */
        DOM.simYears.addEventListener('input', (e) => {
            const lbl = i18n[state.lang].yearsLabel;
            DOM.yearsVal.innerHTML = `${e.target.value} <span data-i18n="yearsLabel">${lbl}</span>`;
        });

        DOM.btnCalc.addEventListener('click', calculateCompound);
        DOM.btnAddAsset.addEventListener('click', addAsset);
        
        DOM.searchAsset.addEventListener('input', (e) => {
            state.searchTerm = e.target.value;
            renderTable(); // Re-filters array dynamically
        });

        // Add tailwind arbitrary keyframe dynamically for the form shake error
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
        `;
        document.head.appendChild(style);

        /**
         * INIT
         */
        function init() {
            updateUIStrings();
            calculateCompound();
            reRenderPortfolio();
        }

        // Bootstrap App
        window.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
